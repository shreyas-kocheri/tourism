<!DOCTYPE html>
<html>
<head>
  <title>Contributor – Trinetra AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🧑‍🌾 Local Contributor</h2>

<div class="card">
  <input id="c_name" placeholder="Your name">
  <select id="c_state">
    <option value="">Select State</option>
    <option value="Uttarakhand">Uttarakhand</option>
  </select>
  <input id="c_district" placeholder="District (e.g. Dehradun)">
  <textarea id="c_message" placeholder="Local update"></textarea>

  <button onclick="submitContribution()">Post Update</button>
</div>

<a href="index.html" class="back">← Back</a>

<script src="script.js"></script>
</body>
</html>
